services:
  mailai-agent:
    build: .
    container_name: mailai-agent
    restart: unless-stopped
    ports:
      - "${GMAIL_OAUTH_LOCAL_PORT:-8080}:${GMAIL_OAUTH_LOCAL_PORT:-8080}"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    environment:
      # Ensure host .env values (e.g. POLL_INTERVAL_MINUTES) are applied on every start
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-180}
